[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers --tb=short
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (multiple components)
    performance: Performance tests (benchmarks)
    security: Security tests (auth, encryption)
    slow: Slow running tests
    skip_ci: Skip in CI/CD

# Coverage options
[coverage:run]
source = pipeline, api_v2, api_models
omit =
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
